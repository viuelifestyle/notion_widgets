<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weather Widget</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: transparent;
  }

  .widget {
    width: 100%;
    max-width: 720px;
    padding: 20px 24px;
    border-radius: 16px;
    background: #f5f5f5;
    color: #2f2f2f;
  }

  .top {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .left h1 {
    font-size: 15px;
    margin: 0;
    letter-spacing: 1px;
    font-weight: 600;
  }

  .left span {
    font-size: 11px;
    opacity: 0.6;
  }

  .right {
    text-align: right;
  }

  .temp {
    font-size: 30px;
    font-weight: 600;
  }

  .desc {
    font-size: 12px;
    opacity: 0.7;
  }

  .forecast {
    display: flex;
    justify-content: space-between;
    margin-top: 22px;
  }

  .day {
    text-align: center;
    font-size: 13px;
    flex: 1;
  }

  .icon {
    font-size: 22px;
    margin: 6px 0;
  }

  .date {
    font-size: 11px;
    opacity: 0.6;
    margin-bottom: 2px;
  }

  .temps {
    font-size: 12px;
    line-height: 1.2;
  }

  .controls {
    margin-top: 16px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  input {
    font-size: 11px;
    padding: 3px;
  }
</style>
</head>

<body>

<div class="widget">

  <!-- HEADER -->
  <div class="top">
    <div class="left">
      <h1 id="location">SAPPORO</h1>
      <span>WEATHER</span>
    </div>

    <div class="right">
      <div class="temp" id="temp">--°C</div>
      <div class="desc" id="desc">Loading...</div>
    </div>
  </div>

  <!-- FORECAST -->
  <div class="forecast" id="forecast"></div>

  <!-- DATE CONTROLS (EDIT ANYTIME) -->
  <div class="controls">
    <input type="date" id="date1">
    <input type="date" id="date2">
    <input type="date" id="date3">
    <input type="date" id="date4">
    <input type="date" id="date5">
  </div>

</div>

<script>
  // 📍 LOCATION (EDIT IF YOU WANT)
  const lat = 43.0556;
  const lon = 141.3533;
  const locationName = "SAPPORO";

  document.getElementById("location").textContent = locationName;

  // 🌤️ WEATHER API
  fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto`)
    .then(res => res.json())
    .then(data => {

      // current temp
      document.getElementById("temp").textContent =
        Math.round(data.current_weather.temperature) + "°C";

      document.getElementById("desc").textContent = "current weather";

      const forecastDiv = document.getElementById("forecast");
      forecastDiv.innerHTML = "";

      const days = data.daily.time.slice(0, 5);

      days.forEach((day, i) => {
        const el = document.createElement("div");
        el.className = "day";

        el.innerHTML = `
          <div>${new Date(day).toLocaleDateString('en-US', { weekday: 'short' })}</div>
          <div class="icon">${getIcon(data.daily.weathercode[i])}</div>
          <div class="date" id="dateText${i}"></div>
          <div class="temps">
            ${Math.round(data.daily.temperature_2m_max[i])}°C<br>
            ${Math.round(data.daily.temperature_2m_min[i])}°C
          </div>
        `;

        forecastDiv.appendChild(el);
      });

      initCustomDates(days);
    });

  // 🌥️ ICON LOGIC
  function getIcon(code) {
    if (code === 0) return "☀️";
    if (code <= 3) return "⛅";
    if (code <= 48) return "☁️";
    if (code <= 67) return "🌧️";
    if (code <= 77) return "❄️";
    if (code <= 99) return "⛈️";
    return "☁️";
  }

  // 📅 CUSTOM DATE SYSTEM
  function initCustomDates(apiDates) {

    let customDates = [...apiDates];

    function updateDisplay() {
      customDates.forEach((d, i) => {
        document.getElementById("dateText" + i).textContent =
          new Date(d).toLocaleDateString('en-US', {
            month: 'short',
            day: 'numeric'
          });
      });
    }

    updateDisplay();

    // allow manual editing via inputs
    for (let i = 0; i < 5; i++) {
      const input = document.getElementById("date" + (i + 1));

      input.addEventListener("change", (e) => {
        if (e.target.value) {
          customDates[i] = e.target.value;
          updateDisplay();
        }
      });
    }
  }
</script>

</body>
</html>
